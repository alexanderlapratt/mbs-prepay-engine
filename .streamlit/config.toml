[theme]
base            = "dark"
primaryColor    = "#00D4FF"
backgroundColor = "#0E0E1A"
secondaryBackgroundColor = "#13131F"
textColor       = "#E0E0F0"
font            = "sans serif"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[runner]
magicEnabled    = false

[client]
showErrorDetails = true
toolbarMode      = "viewer"
